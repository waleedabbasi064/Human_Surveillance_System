models:
    detection:
        name: "yolo"
        variant: "n"
        confidence_threshold: 0.30
        iou_threshold: 0.45
        device: "cpu"
        classes:
        weights:
            yolo:
                n: "yolov8n.pt"
                s: "yolov8s.pt"
                m: "yolov8m.pt"
                l: "yolov8l.pt"
                x: "yolov8x.pt"
        # Moved tracking out of weights to match the PersonDetector class logic
        tracking:
            track_high_thresh: 0.30
            track_low_thresh: 0.15
            new_track_thresh: 0.30
            match_thresh: 0.80
            track_buffer: 30
            min_box_area: 10
            mot20: false

    # FIXED: This must be at the same indentation level as 'detection'
    sparta:
        branch: "SPARTA_C" # SPARTA_C | SPARTA_F | SPARTA_H (UI will override)
        relative: true # must match the checkpoint training config
        token_config: "t"
        num_kp: 18
        seg_len: 24
        model_num_heads: 2
        model_latent_dim: 64
        dropout: 0.3
        checkpoints:
            sparta_c: "results-sparta-c/checkpoint_best.pth.tar"
            eer_threshold_c: 0.03000000000000001
            sparta_f: "results-sparta-f/checkpoint_best.pth.tar"
            eer_threshold_f: 0.0644547895546187
            sparta_h_c: "results-sparta-c/checkpoint_best.pth.tar"
            sparta_h_f: "results-sparta-f/checkpoint_best.pth.tar"

    pose:
        name: "vitpose"
        variant: "small"
        confidence_threshold: 0.25
        iou_threshold: 0.45
        min_keypoint_confidence: 0.30
        device: "cpu"
        fourcc: "XVID"
        save_video: true
        weights:
            vitpose:
                large:
                    config: "../mmpose/configs/body_2d_keypoint/topdown_heatmap/coco/td-hm_ViTPose-large_8xb64-210e_coco-256x192.py"
                    checkpoint: "./td-hm_ViTPose-large_8xb64-210e_coco-256x192-53609f55_20230314.pth"
                base:
                    config: "../mmpose/configs/body_2d_keypoint/topdown_heatmap/coco/td-hm_ViTPose-base_8xb64-210e_coco-256x192.py"
                    checkpoint: "./td-hm_ViTPose-base_8xb64-210e_coco-256x192-216eae50_20230314.pth"
                small:
                    config: "../mmpose/configs/body_2d_keypoint/topdown_heatmap/coco/td-hm_ViTPose-small_8xb64-210e_coco-256x192.py"
                    checkpoint: "./td-hm_ViTPose-small_8xb64-210e_coco-256x192-62d7a712_20230314.pth"
            rtm:
                l:
                    config: "../mmpose/configs/body_2d_keypoint/rtmpose/coco/rtmpose-l_8xb256-420e_coco-256x192.py"
                    checkpoint: "./rtmpose-l_simcc-coco_pt-aic-coco_420e-256x192-1352a4d2_20230127.pth"

            yolo-pose:
                x: "./yolo26x-pose.pt"
                l: "./yolo26l-pose.pt"
                m: "./yolo26m-pose.pt"
                s: "./yolo26s-pose.pt"
                n: "./yolo26n-pose.pt"

paths:
    input_video: "../videos"
    pose_output_dir: "/home/waleed64/Documents/Human_Centric_Anomaly_Detection_Agent/pose_outputs"
    sparta_output_dir: "/home/waleed64/Documents/Human_Centric_Anomaly_Detection_Agent/evaluation_results_sparta"
    static_prefix: "01_"
    pose_json_suffix: ".json"

inference:
    no_metrics: save # don’t require masks
    save_results: save
    save_results_dir: "/home/waleed64/Documents/Human_Centric_Anomaly_Detection_Agent/evaluation_results_sparta"
